databaseChangeLog:
  - changeSet:
      id: create-categories-table
      author: bim121
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: description
                  type: VARCHAR(1000)

              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
