databaseChangeLog:
  - changeSet:
      id: create-shopping-cart-table
      author: bim121
      changes:
        - createTable:
            tableName: shopping_carts
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: shopping_carts
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_shopping_cart_user
        - addUniqueConstraint:
            tableName: shopping_carts
            columnNames: user_id
            constraintName: uk_shopping_cart_user
